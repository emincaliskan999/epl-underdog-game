<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess the Underdog</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <main class="game-container">
      <section id="gameScreen" class="screen">
        <div class="topbar">
          <div class="round-badge">Match <span id="roundNumber">1</span></div>
          <div class="progress-wrap">
            <div class="progress-text" id="progressText">Match 1 / 4</div>
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>

        <header class="hero">
          <p class="eyebrow">1XBET Odds Challenge</p>
          <h1>Who is the underdog?</h1>
          <p class="subtitle">Choose the team with the higher odds.</p>
        </header>

        <section class="matchup-grid">
          <button class="team-card" id="teamAButton">
            <div class="team-card-inner">
              <div class="team-face team-front">
                <div class="team-visual">
                  <img id="teamALogo" class="team-logo" src="" alt="Team A logo" />
                </div>
              </div>

              <div class="team-face team-back">
                <div class="odds-label">1XBET Odds</div>
                <div class="odds-value" id="teamAOdds">2.20</div>
              </div>
            </div>
          </button>

          <div class="versus">VS</div>

          <button class="team-card" id="teamBButton">
            <div class="team-card-inner">
              <div class="team-face team-front">
                <div class="team-visual">
                  <img id="teamBLogo" class="team-logo" src="" alt="Team B logo" />
                </div>
              </div>

              <div class="team-face team-back">
                <div class="odds-label">1XBET Odds</div>
                <div class="odds-value" id="teamBOdds">1.69</div>
              </div>
            </div>
          </button>
        </section>

        <div id="feedbackBox" class="feedback-box hidden"></div>

        <div class="controls">
          <button id="nextButton" class="action-button hidden">Next Match</button>
        </div>
      </section>

      <section id="endScreen" class="screen hidden end-screen">
        <p class="eyebrow">Challenge Complete</p>
        <h2>Your Score</h2>
        <div class="final-score" id="finalScore">0/4</div>
        <p class="final-message" id="finalMessage">Run it back and beat the odds.</p>
        <button id="restartFromEnd" class="action-button">Play Again</button>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
